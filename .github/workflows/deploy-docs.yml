name: Deploy Documentation

on:
  # Run when openapi.json is updated
  push:
    branches: [main]
    paths:
      - 'out/openapi.json'
      - '.github/workflows/deploy-docs.yml'
  
  # Allow manual trigger
  workflow_dispatch:

# Allow GitHub Pages deployment
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy-docs:
    name: Generate and Deploy Documentation
    runs-on: ubuntu-latest
    
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Validate OpenAPI spec
        run: python3 validate_spec.py out/openapi.json

      - name: Generate HTML documentation
        run: |
          mkdir -p out/docs
          npx --yes @redocly/cli build-docs out/openapi.json \
            --output out/docs/index.html \
            --title "CIPP API Documentation" \
            --disableGoogleFont \
            --theme.openapi.theme.typography.fontFamily="'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" \
            --theme.openapi.theme.typography.fontSize='16px' \
            --theme.openapi.theme.typography.lineHeight='1.6' \
            --theme.openapi.theme.typography.headings.fontFamily="'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" \
            --theme.openapi.theme.typography.headings.fontWeight='600' \
            --theme.openapi.theme.colors.primary.main='#F77F00' \
            --theme.openapi.theme.colors.primary.light='#FF9933' \
            --theme.openapi.theme.colors.primary.dark='#D66D00' \
            --theme.openapi.theme.colors.success.main='#10B981' \
            --theme.openapi.theme.colors.success.light='#3FC79A' \
            --theme.openapi.theme.colors.warning.main='#F79009' \
            --theme.openapi.theme.colors.error.main='#F04438' \
            --theme.openapi.theme.colors.error.light='#FEE4E2' \
            --theme.openapi.theme.colors.text.primary='#101828' \
            --theme.openapi.theme.colors.text.secondary='#667085' \
            --theme.openapi.theme.sidebar.backgroundColor='#0C121D' \
            --theme.openapi.theme.sidebar.textColor='#FFFFFF' \
            --theme.openapi.theme.sidebar.activeTextColor='#F77F00' \
            --theme.openapi.theme.sidebar.groupItems.activeBackgroundColor='rgba(247, 127, 0, 0.15)' \
            --theme.openapi.theme.sidebar.groupItems.activeTextColor='#F77F00' \
            --theme.openapi.theme.colors.http.get='#10B981' \
            --theme.openapi.theme.colors.http.post='#F77F00' \
            --theme.openapi.theme.colors.http.put='#06AED4' \
            --theme.openapi.theme.colors.http.patch='#9E77ED' \
            --theme.openapi.theme.colors.http.delete='#F04438' \
            --theme.openapi.theme.rightPanel.backgroundColor='#101826' \
            --theme.openapi.theme.rightPanel.textColor='#FFFFFF' \
            --theme.openapi.theme.codeBlock.backgroundColor='#F9FAFB' \
            --theme.openapi.theme.schema.nestedBackground='#FAFBFC' \
            --theme.openapi.theme.schema.typeNameColor='#F77F00' \
            --theme.openapi.theme.schema.typeTitleColor='#101828' \
            --theme.openapi.theme.spacing.unit='5' \
            --theme.openapi.theme.spacing.sectionHorizontal='40' \
            --theme.openapi.theme.spacing.sectionVertical='40' \
            --theme.openapi.requiredPropsFirst=true \
            --theme.openapi.expandResponses='200,201'

      - name: Create docs index page
        run: |
          cat > out/docs/README.md << 'EOF'
          # CIPP API Documentation
          
          Interactive API documentation generated from the OpenAPI 3.1 specification.
          
          **[View Documentation](index.html)**
          
          ---
          
          Auto-generated from commit: ${{ github.sha }}
          
          [View source on GitHub](https://github.com/${{ github.repository }})
          EOF

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'out/docs'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Summary
        run: |
          echo "## 📚 Documentation Deployed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Documentation is now available at:" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "🔗 ${{ steps.deployment.outputs.page_url }}" >> $GITHUB_STEP_SUMMARY
